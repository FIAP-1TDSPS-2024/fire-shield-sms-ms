spring.application.name=fire-shield-sms-ms
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

#Database
spring.profiles.active=prod
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## Flyway
spring.flyway.enabled=false
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=0

logging.level.org.springframework.security=TRACE
logging.level.br.com.fiap.projectmgtmvc=TRACE

spring.jackson.property-naming-strategy= SNAKE_CASE

# JWT
jwt.secret=${JWT_SECRET:fire-shield-sms-ms-local-secret-32-chars}
jwt.issuer=fire-shield-sms-ms
jwt.expiration-minutes=60

# RabbitMQ CloudAMQP
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5671}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=true

spring.rabbitmq.listener.simple.missing-queues-fatal=false

spring.ai.mcp.server.name=mcp-fire-shield-sms
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE

spring.docker.compose.enabled=false
