spring.datasource.url=jdbc:h2:mem:fire_shield;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.docker.compose.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
RABBITMQ_QUEUE_ORIGIN=test-ocorrencias
SMS_SID=test-sid
SMS_TOKEN=test-token
SMS_NUMERO=+5511999999999
jwt.secret=fire-shield-sms-ms-test-secret-32-chars
jwt.issuer=fire-shield-sms-ms
jwt.expiration-minutes=60
